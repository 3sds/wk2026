<title>Mijn pronostiek — De grote DS WK 2026</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1410;--ink2:#3d3328;--muted:#8a7d6a;--muted2:#b5a990;
  --paper:#faf6ef;--paper2:#f2ead8;--paper3:#e8ddc8;
  --red:#c8102e;--red2:#a00c24;--gold:#b8860b;
  --green:#2d6a45;
  --border:rgba(26,20,16,0.12);--border2:rgba(26,20,16,0.22);
  --shadow:0 2px 12px rgba(26,20,16,0.10);
  --font-head:'Playfair Display',Georgia,serif;
  --font-body:'Source Serif 4',Georgia,serif;
  --font-mono:'DM Mono',monospace;
  --r:8px;--rl:14px;
}
html{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px}
body{max-width:820px;margin:0 auto;padding:0 1.25rem 5rem}

/* NAV */
.ds-nav{position:sticky;top:0;z-index:100;background:var(--ink);border-bottom:2px solid var(--red)}
.ds-nav-inner{max-width:900px;margin:0 auto;padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:46px}
.nav-logo{font-family:var(--font-head);font-size:0.95rem;font-weight:700;color:#fff;text-decoration:none}
.nav-logo em{font-style:italic;color:#f08090}
.nav-links{display:flex;gap:4px}
.nav-links a{font-family:var(--font-mono);font-size:0.68rem;color:rgba(255,255,255,0.7);text-decoration:none;padding:5px 10px;border-radius:4px;transition:background .12s,color .12s;white-space:nowrap}
.nav-links a:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-links a.active{background:var(--red);color:#fff}
.nav-dropdown{position:relative;display:inline-block}
.nav-dropdown-trigger{cursor:pointer}
.nav-dropdown-menu{display:none;position:absolute;top:100%;left:0;background:var(--ink);border-top:2px solid var(--red);border-radius:0 0 var(--r) var(--r);min-width:160px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.nav-dropdown:hover .nav-dropdown-menu{display:block}
.nav-dropdown-menu a{display:block;padding:9px 16px;font-family:var(--font-mono);font-size:0.68rem;color:rgba(255,255,255,0.8);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.08);transition:background .1s}
.nav-dropdown-menu a:hover{background:rgba(255,255,255,0.1);color:#fff}

/* MASTHEAD */
.masthead{border-bottom:3px double var(--ink);padding:2rem 0 0;margin-bottom:2rem;position:relative}
.masthead::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(200,16,46,0.05),transparent);pointer-events:none}
.masthead-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.masthead-meta{text-align:right;font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);line-height:1.7;padding-top:4px}
.masthead-meta strong{color:var(--ink2)}
.masthead-title-wrap{text-align:center;padding:1.2rem 0 1.4rem}
.masthead-eyebrow{font-family:var(--font-mono);font-size:0.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.masthead-h1{font-family:var(--font-head);font-size:clamp(1.8rem,5vw,3rem);font-weight:900;line-height:1;letter-spacing:-.02em}
.masthead-h1 em{font-style:italic;color:var(--red)}
.masthead-sub{font-family:var(--font-body);font-size:0.82rem;color:var(--muted);margin-top:.6rem;font-style:italic}
.masthead-rule{display:flex;align-items:center;gap:.75rem;margin-top:1rem}
.masthead-rule span{flex:1;height:1px;background:var(--ink)}
.oct{font-size:1.4rem;line-height:1}

/* ZOEK */
.zoek-wrap{max-width:420px;margin:0 auto 2.5rem;display:flex;gap:10px}
.zoek-wrap input{flex:1;background:#fff;border:1px solid var(--border2);border-radius:var(--r);color:var(--ink);font-family:var(--font-body);font-size:0.95rem;padding:10px 14px;transition:border-color .15s,box-shadow .15s}
.zoek-wrap input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,0.08)}
.zoek-wrap input::placeholder{color:var(--muted2);font-style:italic}
.btn-primary{background:var(--red);border:1px solid var(--red);border-radius:var(--r);color:#fff;font-family:var(--font-body);font-size:0.85rem;font-weight:600;padding:10px 20px;cursor:pointer;transition:background .12s}
.btn-primary:hover{background:var(--red2)}

/* RESULTAAT */
#resultaat{display:none}
.prono-header{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.prono-naam{font-family:var(--font-head);font-size:1.4rem;font-weight:700;color:var(--ink)}
.prono-meta{font-family:var(--font-mono);font-size:0.68rem;color:var(--muted);line-height:1.8}
.prono-meta strong{color:var(--ink2)}
.print-btn{background:var(--paper2);border:1px solid var(--border2);border-radius:var(--r);color:var(--ink2);font-family:var(--font-mono);font-size:0.7rem;padding:7px 14px;cursor:pointer;transition:background .12s}
.print-btn:hover{background:var(--paper3)}

/* GROEPEN */
.section{margin-bottom:2rem}
.section-head{display:flex;align-items:baseline;gap:.75rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.section-num{font-family:var(--font-mono);font-size:0.6rem;color:var(--red);font-weight:500;letter-spacing:.08em;border:1px solid var(--red);border-radius:3px;padding:1px 5px;flex-shrink:0}
.section-label{font-family:var(--font-head);font-size:1.05rem;font-weight:700;color:var(--ink)}

.group-block{background:#fff;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;box-shadow:var(--shadow)}
.group-header{padding:9px 16px;background:var(--paper2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.group-letter{font-family:var(--font-mono);font-size:0.65rem;font-weight:500;background:var(--red);color:#fff;padding:2px 7px;border-radius:4px}
.group-teams-label{font-size:0.75rem;color:var(--muted);flex:1;font-style:italic}
.match-row{display:grid;grid-template-columns:1fr 50px 20px 50px 1fr;align-items:center;gap:6px;padding:7px 16px;border-bottom:1px solid var(--border)}
.match-row-pts{display:grid;grid-template-columns:1fr 50px 20px 50px 1fr 52px 44px;align-items:center;gap:6px;padding:7px 16px;border-bottom:1px solid var(--border)}
.match-row-pts:last-child{border-bottom:none}
.match-row:last-child{border-bottom:none}
.team-home{text-align:right;font-size:0.82rem;font-weight:600;color:var(--ink)}
.team-away{text-align:left;font-size:0.82rem;font-weight:600;color:var(--ink)}
.score-val{text-align:center;font-family:var(--font-mono);font-size:1rem;font-weight:500;color:var(--red2)}
.score-empty{text-align:center;font-family:var(--font-mono);font-size:0.85rem;color:var(--muted2)}
.sep{text-align:center;font-size:0.8rem;color:var(--muted);font-family:var(--font-mono)}

/* GROEPSWINNAARS */
.winnaars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1rem}
.winnaar-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;box-shadow:var(--shadow)}
.winnaar-groep{font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-bottom:3px}
.winnaar-naam{font-family:var(--font-body);font-size:0.85rem;font-weight:600;color:var(--ink)}

/* BONUS */
.bonus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.bonus-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;box-shadow:var(--shadow)}
.bonus-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.bonus-val{font-family:var(--font-body);font-size:1rem;font-weight:600;color:var(--ink)}

/* FOUT */
.fout-msg{text-align:center;padding:2rem;font-family:var(--font-mono);font-size:0.8rem;color:var(--muted);background:var(--paper2);border-radius:var(--rl)}

/* PRINT */
@media print {
  .ds-nav,.zoek-wrap,.print-btn{display:none!important}
  body{padding:0}
  .masthead{padding-top:.5rem}
  .group-block,.bonus-card,.winnaar-card{box-shadow:none;break-inside:avoid}
}
</style>
</head>

<header class="masthead">

    <div>

<div class="zoek-wrap">
  <input type="text" id="naam-input" placeholder="Jouw naam (bv. Jan Janssen)" autocomplete="off">
  <input type="password" id="code-input" placeholder="Code" style="width:100px">
  <button class="btn-primary" onclick="laadPronostiek()">Zoek</button>

<div id="resultaat"></div>

<footer style="text-align:center;margin-top:4rem;font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);border-top:3px double var(--ink);padding-top:1.5rem;line-height:1.8">
  <div style="font-size:1.1rem;margin-bottom:.5rem">🐙</div>
  De grote DS WK Pronostiek 2026<br>
  <span style="opacity:.6">Gegenereerd met Claude Sonnet 4.6 · Blijf vrij</span>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxIBSYYVlf1ixg9mwtkF7_cNvYPvx82UeHinUC3PPAvo5svsvjfUpHEz0d_WczFG0NH/exec";

const SCHEMA = {
  A1:{sd:1,thuis:"Mexico",uit:"Zuid-Afrika"},       A2:{sd:1,thuis:"Zuid-Korea",uit:"Tsjechië"},
  A3:{sd:2,thuis:"Tsjechië",uit:"Zuid-Afrika"},      A4:{sd:2,thuis:"Mexico",uit:"Zuid-Korea"},
  A5:{sd:3,thuis:"Tsjechië",uit:"Mexico"},           A6:{sd:3,thuis:"Zuid-Afrika",uit:"Zuid-Korea"},
  B1:{sd:1,thuis:"Canada",uit:"Bosnië"},             B2:{sd:1,thuis:"Qatar",uit:"Zwitserland"},
  B3:{sd:2,thuis:"Zwitserland",uit:"Bosnië"},        B4:{sd:2,thuis:"Canada",uit:"Qatar"},
  B5:{sd:3,thuis:"Zwitserland",uit:"Canada"},        B6:{sd:3,thuis:"Bosnië",uit:"Qatar"},
  C1:{sd:1,thuis:"Brazilië",uit:"Marokko"},          C2:{sd:1,thuis:"Haïti",uit:"Schotland"},
  C3:{sd:2,thuis:"Schotland",uit:"Marokko"},         C4:{sd:2,thuis:"Brazilië",uit:"Haïti"},
  C5:{sd:3,thuis:"Schotland",uit:"Brazilië"},        C6:{sd:3,thuis:"Marokko",uit:"Haïti"},
  D1:{sd:1,thuis:"VS",uit:"Paraguay"},               D2:{sd:1,thuis:"Australië",uit:"Turkije"},
  D3:{sd:2,thuis:"VS",uit:"Australië"},              D4:{sd:2,thuis:"Turkije",uit:"Paraguay"},
  D5:{sd:3,thuis:"Turkije",uit:"VS"},                D6:{sd:3,thuis:"Paraguay",uit:"Australië"},
  E1:{sd:1,thuis:"Duitsland",uit:"Curaçao"},         E2:{sd:1,thuis:"Ivoorkust",uit:"Ecuador"},
  E3:{sd:2,thuis:"Duitsland",uit:"Ivoorkust"},       E4:{sd:2,thuis:"Ecuador",uit:"Curaçao"},
  E5:{sd:3,thuis:"Ecuador",uit:"Duitsland"},         E6:{sd:3,thuis:"Curaçao",uit:"Ivoorkust"},
  F1:{sd:1,thuis:"Nederland",uit:"Japan"},           F2:{sd:1,thuis:"Zweden",uit:"Tunesië"},
  F3:{sd:2,thuis:"Nederland",uit:"Zweden"},          F4:{sd:2,thuis:"Tunesië",uit:"Japan"},
  F5:{sd:3,thuis:"Japan",uit:"Zweden"},              F6:{sd:3,thuis:"Tunesië",uit:"Nederland"},
  G1:{sd:1,thuis:"België",uit:"Egypte"},             G2:{sd:1,thuis:"Iran",uit:"Nieuw-Zeeland"},
  G3:{sd:2,thuis:"België",uit:"Iran"},               G4:{sd:2,thuis:"Nieuw-Zeeland",uit:"Egypte"},
  G5:{sd:3,thuis:"Egypte",uit:"Iran"},               G6:{sd:3,thuis:"Nieuw-Zeeland",uit:"België"},
  H1:{sd:1,thuis:"Spanje",uit:"Kaapverdië"},         H2:{sd:1,thuis:"Saoedi-Arabië",uit:"Uruguay"},
  H3:{sd:2,thuis:"Spanje",uit:"Saoedi-Arabië"},      H4:{sd:2,thuis:"Uruguay",uit:"Kaapverdië"},
  H5:{sd:3,thuis:"Kaapverdië",uit:"Saoedi-Arabië"},  H6:{sd:3,thuis:"Uruguay",uit:"Spanje"},
  I1:{sd:1,thuis:"Frankrijk",uit:"Senegal"},         I2:{sd:1,thuis:"Irak",uit:"Noorwegen"},
  I3:{sd:2,thuis:"Frankrijk",uit:"Irak"},            I4:{sd:2,thuis:"Noorwegen",uit:"Senegal"},
  I5:{sd:3,thuis:"Noorwegen",uit:"Frankrijk"},       I6:{sd:3,thuis:"Senegal",uit:"Irak"},
  J1:{sd:1,thuis:"Argentinië",uit:"Algerije"},       J2:{sd:1,thuis:"Oostenrijk",uit:"Jordanië"},
  J3:{sd:2,thuis:"Argentinië",uit:"Oostenrijk"},     J4:{sd:2,thuis:"Jordanië",uit:"Algerije"},
  J5:{sd:3,thuis:"Algerije",uit:"Oostenrijk"},       J6:{sd:3,thuis:"Jordanië",uit:"Argentinië"},
  K1:{sd:1,thuis:"Portugal",uit:"DR Congo"},         K2:{sd:1,thuis:"Oezbekistan",uit:"Colombia"},
  K3:{sd:2,thuis:"Portugal",uit:"Oezbekistan"},      K4:{sd:2,thuis:"Colombia",uit:"DR Congo"},
  K5:{sd:3,thuis:"Colombia",uit:"Portugal"},         K6:{sd:3,thuis:"DR Congo",uit:"Oezbekistan"},
  L1:{sd:1,thuis:"Engeland",uit:"Kroatië"},          L2:{sd:1,thuis:"Ghana",uit:"Panama"},
  L3:{sd:2,thuis:"Engeland",uit:"Ghana"},            L4:{sd:2,thuis:"Panama",uit:"Kroatië"},
  L5:{sd:3,thuis:"Kroatië",uit:"Ghana"},             L6:{sd:3,thuis:"Panama",uit:"Engeland"}
};

const GROEPEN = {
  A:["Mexico","Zuid-Afrika","Zuid-Korea","Tsjechië"],
  B:["Canada","Bosnië","Qatar","Zwitserland"],
  C:["Brazilië","Marokko","Haïti","Schotland"],
  D:["VS","Paraguay","Australië","Turkije"],
  E:["Duitsland","Curaçao","Ivoorkust","Ecuador"],
  F:["Nederland","Japan","Zweden","Tunesië"],
  G:["België","Egypte","Iran","Nieuw-Zeeland"],
  H:["Spanje","Kaapverdië","Saoedi-Arabië","Uruguay"],
  I:["Frankrijk","Senegal","Irak","Noorwegen"],
  J:["Argentinië","Algerije","Oostenrijk","Jordanië"],
  K:["Portugal","DR Congo","Oezbekistan","Colombia"],
  L:["Engeland","Kroatië","Ghana","Panama"]
};

const MODEL_LABELS = {
  random:"🎲", fifa:"🏅", historisch:"📜", god:"⚗️",
  bbp:"📈", bier:"🍺", choco:"🍫", maximus:"🐱", manueel:"✏️"
};

const GEHEIME_CODE = "ds2026";  // ← wijzig dit naar jouw eigen code

function laadPronostiek() {
  var naam = document.getElementById("naam-input").value.trim();
  var code = document.getElementById("code-input").value.trim();
  if (!naam) return;
  if (code !== GEHEIME_CODE) {
    document.getElementById("resultaat").style.display = "block";
    document.getElementById("resultaat").innerHTML = '<div class="fout-msg">Beschikbaar na de groepsfase.</div>';
    return;
  }

  var old = document.getElementById("jsonp-prono");
  if (old) old.parentNode.removeChild(old);

  // Laad ook echte uitslagen voor vergelijking
  window.__scoreboardCallback = function(sbData) {
    window.__echteScores = {};
    window.__puntensysteem = sbData.meta ? sbData.meta.puntensysteem : {};
    if (sbData.meta && sbData.meta.aantalGespeeld > 0) {
      // Haal echte scores uit deelnemers (niet direct beschikbaar in meta)
      // We gebruiken de uitslagen via een aparte call
    }
  };

  window.__pronoCallback = function(data) {
    if (data.status === "not_found") {
      document.getElementById("resultaat").style.display = "block";
      document.getElementById("resultaat").innerHTML =
        '<div class="fout-msg">Naam "' + naam + '" niet gevonden. Controleer de schrijfwijze.</div>';
      return;
    }
    if (data.status === "error") {
      document.getElementById("resultaat").style.display = "block";
      document.getElementById("resultaat").innerHTML =
        '<div class="fout-msg">Fout: ' + data.message + '</div>';
      return;
    }
    renderPronostiek(data);
  };

  // Haal eerst echte uitslagen op
  var oldSb = document.getElementById("jsonp-sb");
  if (oldSb) oldSb.parentNode.removeChild(oldSb);

  window.__uitlagenCallback = function(sbData) {
    // Sla echte scores op
    window.__echteScores = {};
    window.__pts = (sbData.meta && sbData.meta.puntensysteem) ? sbData.meta.puntensysteem : {uitslag:2,score:3};
    // Echte scores zitten niet direct in scorebord — gebruik uitslagen endpoint
    // We halen ze op via een tweede call
    var scriptP = document.createElement("script");
    scriptP.id = "jsonp-prono";
    scriptP.src = API_URL + "?actie=pronostiek&naam=" + encodeURIComponent(naam) + "&callback=__pronoCallback";
    document.body.appendChild(scriptP);
  };

  // Haal uitslagen op via scorebord (bevat echteScores indirect)
  // Eenvoudiger: gebruik een aparte uitslagen-actie
  window.__pronoCallback = window.__pronoCallback; // redefine hieronder
  var scriptSb = document.createElement("script");
  scriptSb.id = "jsonp-sb";
  scriptSb.src = API_URL + "?actie=uitslagen&callback=__uitlagenCallback";
  document.body.appendChild(scriptSb);
}

// Enter-toets
["naam-input","code-input"].forEach(function(id){
  document.getElementById(id).addEventListener("keydown", function(e) {
    if (e.key === "Enter") laadPronostiek();
  });
});

function renderPronostiek(d) {
  var modelLabel = MODEL_LABELS[d.model] || d.model || "✏️";
  var tijdstip = d.tijdstip ? new Date(d.tijdstip).toLocaleString("nl-BE") : "";

  var html = '<div class="prono-header">' +
    '<div>' +
      '<div class="prono-naam">' + d.naam + '</div>' +
      '<div class="prono-meta">' +
        'Model: <strong>' + modelLabel + ' ' + (d.model||"manueel") + '</strong>' +
        (d.totaalGroep !== undefined ? ' · Groepsfase: <strong>' + d.totaalGroep + ' pt</strong>' : '') +
        (tijdstip ? ' · Ingezonden: <strong>' + tijdstip + '</strong>' : '') +
      '</div>' +
    '</div>' +
    '<button class="print-btn" onclick="window.print()">🖨 Afdrukken / PDF</button>' +
  '</div>';

  // Groepen
  html += '<div class="section"><div class="section-head"><span class="section-num">01</span><span class="section-label">Groepsfase</span></div>';

  var letters = ["A","B","C","D","E","F","G","H","I","J","K","L"];
  letters.forEach(function(g) {
    var teams = GROEPEN[g];
    var matchIds = Object.keys(SCHEMA).filter(function(id){ return id.charAt(0)===g; });
    html += '<div class="group-block">' +
      '<div class="group-header">' +
        '<span class="group-letter">Groep ' + g + '</span>' +
        '<span class="group-teams-label">' + teams.join(' · ') + '</span>' +
      '</div>';

    matchIds.forEach(function(id) {
      var m = SCHEMA[id];
      var score = d.scores[id] || "";
      var parts = score.split("-");
      var sh = parts[0] !== undefined ? parts[0] : "";
      var sa = parts[1] !== undefined ? parts[1] : "";
      html += '<div class="match-row">' +
        '<div class="team-home">' + m.thuis + '</div>' +
        (sh !== "" ?
          '<div class="score-val">' + sh + '</div><div class="sep">–</div><div class="score-val">' + sa + '</div>' :
          '<div class="score-empty">—</div><div class="sep">–</div><div class="score-empty">—</div>'
        ) +
        '<div class="team-away">' + m.uit + '</div>' +
      '</div>';
    });
    html += '</div>';
  });
  html += '</div>';

  // Groepswinnaars
  if (d.winnaars && Object.keys(d.winnaars).some(function(g){ return d.winnaars[g]; })) {
    html += '<div class="section"><div class="section-head"><span class="section-num">02</span><span class="section-label">Groepswinnaars</span></div>';
    html += '<div class="winnaars-grid">';
    letters.forEach(function(g) {
      var w = d.winnaars[g] || "—";
      html += '<div class="winnaar-card"><div class="winnaar-groep">Groep ' + g + '</div><div class="winnaar-naam">' + w + '</div></div>';
    });
    html += '</div></div>';
  }

  // Bonusvragen
  html += '<div class="section"><div class="section-head"><span class="section-num">03</span><span class="section-label">Bonusvragen</span></div>';
  html += '<div class="bonus-grid">' +
    '<div class="bonus-card"><div class="bonus-label">🥇 Wereldkampioen</div><div class="bonus-val">' + (d.kampioen||"—") + '</div></div>' +
    '<div class="bonus-card"><div class="bonus-label">⚽ Topscorer</div><div class="bonus-val">' + (d.topscorer||"—") + '</div></div>' +
    '<div class="bonus-card"><div class="bonus-label">🎯 Schiftingsvraag 1</div><div class="bonus-val">' + (d.schifting1||"—") + '</div></div>' +
    '<div class="bonus-card"><div class="bonus-label">📐 Schiftingsvraag 2</div><div class="bonus-val">' + (d.schifting2||"—") + ' m</div></div>' +
  '</div></div>';

  var el = document.getElementById("resultaat");
  el.style.display = "block";
  el.innerHTML = html;
}
</script>
</body>
</html>
